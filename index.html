<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Asistencia Grupos</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- LOGIN -->

<div class="container" id="loginBox">

<h2>Ingreso</h2>

<input id="pin" type="password" placeholder="Ingrese PIN">

<button onclick="login()">Entrar</button>

</div>

<!-- APP -->

<div class="container" id="appBox" style="display:none">

<h2>Asistencia General de Grupos Conexión</h2>

<label>Sesión</label>
<select id="sesion"></select>

<label>Grupo Conexión</label>
<select id="grupo"></select>

<label>Total Asistencia</label>
<input id="cantidad" type="number" placeholder="0">

<button id="guardarBtn" onclick="guardar()">GUARDAR</button>

<button class="salirBtn" onclick="salir()">SALIR</button>

</div>

<!-- MENSAJE DEL SISTEMA -->

<div id="mensajeSistema" class="mensaje"></div>

<script src="app.js"></script>

</body>

</html>
